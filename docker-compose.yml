services:

  # ── Reverse Proxy + SSL ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - guessthesong

  # ── Certbot (renova SSL automaticamente) ─────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Roda e sai — o cron do host ou um restart policy cuida da renovação
    entrypoint: >
      sh -c "certbot certonly --webroot --webroot-path=/var/www/certbot
             --email seu@email.com --agree-tos --no-eff-email
             -d music.quizminigames.com
             && certbot certonly --webroot --webroot-path=/var/www/certbot
             --email seu@email.com --agree-tos --no-eff-email
             -d words.quizminigames.com
             && trap exit TERM; while :; do
               certbot renew --webroot --webroot-path=/var/www/certbot;
               sleep 12h & wait $${!};
             done"

  # ── Guess The Song ────────────────────────────────────────────────────────
  guessthesong:
    build: .
    container_name: guessthesong
    restart: unless-stopped
    expose:
      - "8081"
    volumes:
      - guessthesong_data:/data
    environment:
      - TZ=America/Sao_Paulo

volumes:
  certbot_www:
  certbot_certs:
  guessthesong_data:
