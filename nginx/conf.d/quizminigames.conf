# ── HTTP: redireciona para HTTPS e serve o desafio do Certbot ────────────────
server {
    listen 80;
    server_name music.quizminigames.com;

    # Necessário para o Certbot validar o domínio
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: proxy para o Guess The Song ───────────────────────────────────────
server {
    listen 443 ssl;
    server_name music.quizminigames.com;

    ssl_certificate     /etc/letsencrypt/live/music.quizminigames.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/music.quizminigames.com/privkey.pem;

    # Boas práticas de segurança SSL
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;

    # Tamanho máximo de upload (caso adicione features no futuro)
    client_max_body_size 10M;

    location / {
        proxy_pass         http://guessthesong:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Evita timeout em conexões lentas
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }
}
