# ── HTTP: redireciona para HTTPS e serve o desafio do Certbot ────────────────
server {
    listen 80;
    server_name music.quizminigames.com words.quizminigames.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: music.quizminigames.com ───────────────────────────────────────────
server {
    listen 443 ssl;
    server_name music.quizminigames.com;

    ssl_certificate     /etc/letsencrypt/live/music.quizminigames.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/music.quizminigames.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://guessthesong:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }
}

# ── HTTPS: words.quizminigames.com ───────────────────────────────────────────
server {
    listen 443 ssl;
    server_name words.quizminigames.com;

    ssl_certificate     /etc/letsencrypt/live/words.quizminigames.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/words.quizminigames.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;

    client_max_body_size 10M;

    # Raiz redireciona para /words
    location = / {
        return 301 https://words.quizminigames.com/words;
    }

    location / {
        proxy_pass         http://guessthesong:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }
}
